name: Chat Judge GitHub Models

on:
  workflow_dispatch:
    inputs:
      model:
        description: Exact GitHub Models model ID
        required: true
        default: openai/gpt-5-chat
        type: string
      scenario_id:
        description: Optional exact scenario ID
        required: false
        default: ''
        type: string
      scenario_filter:
        description: Optional substring filter for scenario IDs
        required: false
        default: ''
        type: string
      include_auth:
        description: Include auth scenarios if AWS credentials are available on the runner
        required: true
        default: false
        type: boolean
      auth_only:
        description: Run only auth scenarios
        required: true
        default: false
        type: boolean
      app_url:
        description: Optional frontend URL override
        required: false
        default: ''
        type: string
      api_base_url:
        description: Optional API base URL override
        required: false
        default: ''
        type: string

permissions:
  contents: read
  models: read

jobs:
  judge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: true
      LLM_JUDGE_EVALUATOR_MODE: github-models
      LLM_JUDGE_EVALUATOR_MODEL: ${{ inputs.model }}
      LLM_JUDGE_AUTH_PROVISIONER: aws-sdk
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LLM_JUDGE_APP_URL: ${{ inputs.app_url }}
      LLM_JUDGE_API_BASE_URL: ${{ inputs.api_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run chat judge
        id: judge
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/chat-judge
          args=(--output reports/chat-judge/report.json --markdown-output reports/chat-judge/summary.md)
          if [[ "${{ inputs.include_auth }}" == "true" ]]; then
            args+=(--include-auth)
          fi
          if [[ "${{ inputs.auth_only }}" == "true" ]]; then
            args+=(--auth-only)
          fi
          if [[ -n "${{ inputs.scenario_id }}" ]]; then
            args+=(--scenario "${{ inputs.scenario_id }}")
          fi
          if [[ -n "${{ inputs.scenario_filter }}" ]]; then
            args+=(--scenario-filter "${{ inputs.scenario_filter }}")
          fi
          node scripts/run-chat-judge-report.mjs "${args[@]}"

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          if [[ -f reports/chat-judge/summary.md ]]; then
            cat reports/chat-judge/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Chat judge summary was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload judge artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-judge-${{ github.run_id }}
          path: reports/chat-judge/
          if-no-files-found: warn

      - name: Fail workflow on judge failure
        if: steps.judge.outcome == 'failure'
        run: exit 1